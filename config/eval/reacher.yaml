defaults:
  - launcher: local
  - _self_

world:
  env_name: swm/ReacherDMControl-v0
  num_envs: ${eval.num_eval}
  max_episode_steps: ${eval.eval_budget}
  history_size: 1
  frame_skip: 1
  task: qpos_match

dataset:
  keys_to_cache:
    - action

seed: 42
task: reacher
dataset_h5: /data/ykz/reacher/reacher.h5
eval_profile: null

plan_config:
  horizon: 5
  receding_horizon: 5
  action_block: 5 # frameskip

# evaluation from dataset (replay expert trajectories)
eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: dmc/reacher_random
  callables:
    # -- set state
    - method: set_state
      args:
        qpos:
          value: qpos
        qvel:
          value: qvel

    - method: set_target_qpos
      args:
        target_qpos:
          value: goal_qpos

output:
  filename: dmc_results.txt

diffusion_selection_mode: null
diffusion_score_topk: null
diffusion_num_candidates: null
diffusion_truncation_steps: null
diffusion_start_timestep: null
diffusion_eta: null
diffusion_noise_scale: null
diffusion_sampling_temperature: null
diffusion_runtime_execute_steps: null

trajectory_quality:
  enabled: false
  save_npz: true
  truncate_after_success: true
  save_video: true

solver_defaults: &cem_solver
  _target_: stable_worldmodel.solver.CEMSolver
  model: ???
  batch_size: 1
  num_samples: 300
  var_scale: 1.0
  n_steps: 30
  topk: 30
  device: cuda
  seed: ${seed}

diffusion_refinement: &diffusion_refinement_defaults
  enabled: null
  steps: null
  step_size: null
  topk: null
  goal_weight: null
  prior_weight: null
  smoothness_weight: null
  grad_clip_norm: null

profiles:
  mpc:
    planner_type: mpc
    policy: /data/ykz/reacher/lewm_epoch_29
    solver:
      <<: *cem_solver
  diffusion:
    planner_type: diffusion
    policy: /data/ykz/reacher/lewm_epoch_29
    diffusion_bundle: /data/ykz/reacher/diffusion_pipeline/reacher_diffusion_k128_200000/diffusion_planner_best_bundle.pt
    diffusion_selection_mode: wm_only
    diffusion_score_topk: null
    diffusion_num_candidates: 128
    diffusion_truncation_steps: null
    diffusion_start_timestep: null
    diffusion_eta: 0.0
    diffusion_noise_scale: 1.0
    diffusion_sampling_temperature: 1.0
    diffusion_runtime_execute_steps: null
    diffusion_refinement:
      <<: *diffusion_refinement_defaults
      enabled: false
      steps: 1
      step_size: 0.03
      topk: 16
      goal_weight: 1.0
      prior_weight: 0.05
      smoothness_weight: 0.005
      grad_clip_norm: 1.0
  diffusion_h10_wm_only:
    planner_type: diffusion
    policy: /data/ykz/reacher/lewm_epoch_29
    plan_config:
      horizon: 5
      receding_horizon: 2
      action_block: 5
    diffusion_bundle: /data/ykz/reacher/diffusion_pipeline/reacher_h10_diffusion_200k_simple_bce_k128_raw/diffusion_planner_best_bundle.pt
    diffusion_selection_mode: wm_only
    diffusion_score_topk: null
    diffusion_num_candidates: 128
    diffusion_truncation_steps: null
    diffusion_start_timestep: null
    diffusion_eta: 0.0
    diffusion_noise_scale: 1.0
    diffusion_sampling_temperature: 1.0
    diffusion_runtime_execute_steps: 10
    diffusion_refinement:
      <<: *diffusion_refinement_defaults
      enabled: false
      steps: 1
      step_size: 0.03
      topk: 16
      goal_weight: 1.0
      prior_weight: 0.05
      smoothness_weight: 0.005
      grad_clip_norm: 1.0
  diffusion_h10_score_top16_wm:
    planner_type: diffusion
    policy: /data/ykz/reacher/lewm_epoch_29
    plan_config:
      horizon: 5
      receding_horizon: 2
      action_block: 5
    diffusion_bundle: /data/ykz/reacher/diffusion_pipeline/reacher_h10_score_head_mlp_top16_margin/diffusion_planner_best_bundle.pt
    diffusion_selection_mode: score_topk_wm
    diffusion_score_topk: 16
    diffusion_num_candidates: 128
    diffusion_truncation_steps: null
    diffusion_start_timestep: null
    diffusion_eta: 0.0
    diffusion_noise_scale: 1.0
    diffusion_sampling_temperature: 1.0
    diffusion_runtime_execute_steps: 10
    diffusion_refinement:
      <<: *diffusion_refinement_defaults
      enabled: false
      steps: 1
      step_size: 0.03
      topk: 16
      goal_weight: 1.0
      prior_weight: 0.05
      smoothness_weight: 0.005
      grad_clip_norm: 1.0

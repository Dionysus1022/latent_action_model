defaults:
  - launcher: local
  - _self_

world:
  env_name: swm/ReacherDMControl-v0
  num_envs: ${eval.num_eval}
  max_episode_steps: ??? # make sure it's >= eval_budget
  history_size: 1
  frame_skip: 1
  task: qpos_match

dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
    - action

seed: 42
task: reacher
eval_profile: null

plan_config:
  horizon: 5
  receding_horizon: 5
  action_block: 5 # frameskip

# evaluation from dataset (replay expert trajectories)
eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: dmc/reacher_random
  callables:
    # -- set state
    - method: set_state
      args:
        qpos:
          value: qpos
        qvel:
          value: qvel

    - method: set_target_qpos
      args:
        target_qpos:
          value: goal_qpos

output:
  filename: dmc_results.txt

diffusion_selection_mode: null
diffusion_score_topk: null
diffusion_num_candidates: null
diffusion_truncation_steps: null
diffusion_start_timestep: null
diffusion_eta: null
diffusion_noise_scale: null
diffusion_sampling_temperature: null
diffusion_runtime_execute_steps: null

trajectory_quality:
  enabled: false
  save_npz: true
  truncate_after_success: true
  save_video: true

solver_defaults: &cem_solver
  _target_: stable_worldmodel.solver.CEMSolver
  model: ???
  batch_size: 1
  num_samples: 300
  var_scale: 1.0
  n_steps: 30
  topk: 30
  device: cuda
  seed: ${seed}

diffusion_refinement: &diffusion_refinement_defaults
  enabled: null
  steps: null
  step_size: null
  topk: null
  goal_weight: null
  prior_weight: null
  smoothness_weight: null
  grad_clip_norm: null

diffusion_rerank_penalty: &diffusion_rerank_penalty_defaults
  delta_weight: null
  jerk_weight: null
  action_l2_weight: null
  clip_weight: null

corrective: &corrective_defaults
  enabled: null
  mode: null
  corrector_path: null
  correction_interval: null
  execute_horizon: null
  error_threshold: null
  trigger_stat: null
  trigger_quantile: null
  trigger_scope: null
  error_metric: null
  logging:
    log_prediction_error: null
    log_correction_norm: null
    log_replan_count: null

profiles:
  mpc:
    planner_type: mpc
    policy: /data/ykz/reacher/lewm_epoch_29
    solver:
      <<: *cem_solver
  diffusion: &reacher_diffusion_profile
    planner_type: diffusion
    policy: /data/ykz/reacher/lewm_epoch_29
    diffusion_bundle: /data/ykz/reacher/diffusion_pipeline/reacher_diffusion_k128_200000/diffusion_planner_best_bundle.pt
    diffusion_selection_mode: wm_only
    diffusion_score_topk: null
    diffusion_num_candidates: 128
    diffusion_truncation_steps: null
    diffusion_start_timestep: null
    diffusion_eta: 0.0
    diffusion_noise_scale: 1.0
    diffusion_sampling_temperature: 1.0
    diffusion_runtime_execute_steps: null
    diffusion_refinement:
      <<: *diffusion_refinement_defaults
      enabled: false
      steps: 1
      step_size: 0.03
      topk: 16
      goal_weight: 1.0
      prior_weight: 0.05
      smoothness_weight: 0.005
      grad_clip_norm: 1.0
    diffusion_rerank_penalty:
      <<: *diffusion_rerank_penalty_defaults
      delta_weight: 0.0
      jerk_weight: 0.0
      action_l2_weight: 0.0
      clip_weight: 0.0
    corrective:
      <<: *corrective_defaults
      enabled: false
      mode: none
      correction_interval: 2
      error_threshold: 0.5
      trigger_stat: max
      trigger_quantile: 0.9
      trigger_scope: per_env
      error_metric: l2
      logging:
        log_prediction_error: false
        log_correction_norm: true
        log_replan_count: true
  consistency:
    <<: *reacher_diffusion_profile
    diffusion_bundle: /data/ykz/reacher/diffusion_pipeline/consistency/consistency_planner_best_bundle.pt
    diffusion_truncation_steps: 1

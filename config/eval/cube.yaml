defaults:
  - launcher: local
  - _self_

world:
  env_name: swm/OGBCube-v0
  num_envs: ${eval.num_eval}
  max_episode_steps: ${eval.eval_budget}
  history_size: 1
  frame_skip: 1
  env_type: single
  ob_type: states
  multiview: False
  width: 224
  height: 224
  visualize_info: False
  terminate_at_goal: True

dataset:
  keys_to_cache:
    - action

seed: 42
task: cube
dataset_h5: /data/ykz/cube/cube_single_expert.h5
eval_profile: null

plan_config:
  horizon: 5
  receding_horizon: 5
  action_block: 5 # frameskip

# evaluation from dataset (replay expert trajectories)
eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: ogbench/cube_single_expert
  callables:
    # -- set state
    - method: set_state
      args:
        qpos:
          value: qpos
        qvel:
          value: qvel
    # -- set target pos
    - method: set_target_pos
      args:
        cube_id:
          value: 0
          in_dataset: False
        target_pos:
          value: goal_privileged_block_0_pos
        target_quat:
          value: goal_privileged_block_0_quat

output:
  filename: ogb_cube_results.txt

diffusion_selection_mode: null
diffusion_score_topk: null
diffusion_num_candidates: null
diffusion_truncation_steps: null
diffusion_start_timestep: null
diffusion_eta: null
diffusion_noise_scale: null
diffusion_sampling_temperature: null
diffusion_runtime_execute_steps: null

trajectory_quality:
  enabled: false
  save_npz: true
  truncate_after_success: true
  save_video: true

solver_defaults: &cem_solver
  _target_: stable_worldmodel.solver.CEMSolver
  model: ???
  batch_size: 1
  num_samples: 300
  var_scale: 1.0
  n_steps: 30
  topk: 30
  device: cuda
  seed: ${seed}

diffusion_refinement: &diffusion_refinement_defaults
  enabled: null
  steps: null
  step_size: null
  topk: null
  goal_weight: null
  prior_weight: null
  smoothness_weight: null
  grad_clip_norm: null

profiles:
  mpc:
    planner_type: mpc
    policy: /data/ykz/cube/lewm_epoch_27
    solver:
      <<: *cem_solver
  diffusion:
    planner_type: diffusion
    policy: /data/ykz/cube/lewm_epoch_27
    diffusion_bundle: /data/ykz/cube/diffusion_pipeline/cube_diffusion_k128_200000/diffusion_planner_best_bundle.pt
    diffusion_selection_mode: wm_only
    diffusion_score_topk: null
    diffusion_num_candidates: 128
    diffusion_truncation_steps: null
    diffusion_start_timestep: null
    diffusion_eta: 0.0
    diffusion_noise_scale: 1.0
    diffusion_sampling_temperature: 1.0
    diffusion_runtime_execute_steps: null
    diffusion_refinement:
      <<: *diffusion_refinement_defaults
      enabled: false
      steps: 1
      step_size: 0.03
      topk: 16
      goal_weight: 1.0
      prior_weight: 0.05
      smoothness_weight: 0.005
      grad_clip_norm: 1.0

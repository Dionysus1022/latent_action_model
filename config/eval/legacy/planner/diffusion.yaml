# @package _global_

planner_type: diffusion

diffusion_selection_mode: wm_only # formal path; score_only/hybrid are deprecated compatibility modes
diffusion_num_candidates: 128 # must be a positive multiple of the anchor count
diffusion_truncation_steps: null # when null, use bundle default
diffusion_start_timestep: null # when null, use bundle default start timestep
diffusion_eta: 0.0 # reverse-step stochasticity
diffusion_noise_scale: 1.0 # scales the initial noisy anchor proposals
diffusion_sampling_temperature: 1.0 # scales inference-time diffusion noise
diffusion_runtime_execute_steps: null # when null, execute the full action chunk before replanning
diffusion_refinement:
  enabled: false
  steps: 1
  step_size: 0.03
  topk: 16 # when enabled, refine the lowest-cost candidates according to LeWM, not score logits
  goal_weight: 1.0
  prior_weight: 0.05
  smoothness_weight: 0.005
  grad_clip_norm: 1.0
corrective:
  enabled: false
  mode: none
  corrector_path: null
  correction_interval: 2
  execute_horizon: null
  error_threshold: 0.5
  trigger_stat: max # max, mean, quantile
  trigger_quantile: 0.9
  trigger_scope: per_env # per_env, batch
  error_metric: l2
  logging:
    log_prediction_error: false
    log_correction_norm: true
    log_replan_count: true

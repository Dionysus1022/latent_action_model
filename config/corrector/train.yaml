defaults:
  - task: pusht
  - _self_

corrective:
  correction_interval: 5
  action_block: null

model:
  hidden_dim: 512
  num_layers: 3
  dropout: 0.1
  activation: gelu
  predict_residual: true
  residual_scale: 1.0

training:
  noise_std: 0.05
  noise_prob: 1.0
  remainder_noise_std: null
  lambda_action: 1.0
  lambda_goal: 0.0
  lambda_smooth: 0.001
  history_size: 3

train:
  device: cuda
  seed: 42
  max_samples: null
  epochs: 20
  batch_size: 256
  val_batch_size: 512
  val_split: 0.1
  num_workers: 4
  lr: 0.001
  weight_decay: 0.0001
